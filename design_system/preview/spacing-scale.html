<!doctype html>
<!-- @dsCard group="Spacing" name="Spacing scale" subtitle="6 named steps — tiny 4 · xSmall 6 · small 12 · med 20 · large 32 · xLarge 64" viewport="700x200" -->
<html><head><meta charset="utf-8"><title>Spacing — Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:22px 24px;background:#fff;font-family:var(--kls-font-sans);color:#18181A}
  .head{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#838383;margin:0 0 14px}
  .row{display:grid;grid-template-columns:96px 56px 1fr;align-items:center;gap:16px;padding:9px 0;border-top:1px solid #F3F3F3}
  .row:first-of-type{border-top:0}
  .tok{font-size:13px;font-weight:600;color:#18181A;font-family:var(--kls-font-sans)}
  .px{font-size:12px;color:#838383;font-variant-numeric:tabular-nums}
  .bar{height:14px;background:#18181A;border-radius:3px}
</style></head>
<body>
  <p class="head">space · named tokens from app source (Dart)</p>
  <div class="row"><div class="tok">tiny</div><div class="px">4 px</div><div class="bar" style="width:4px"></div></div>
  <div class="row"><div class="tok">xSmall</div><div class="px">6 px</div><div class="bar" style="width:6px"></div></div>
  <div class="row"><div class="tok">small</div><div class="px">12 px</div><div class="bar" style="width:12px"></div></div>
  <div class="row"><div class="tok">med</div><div class="px">20 px</div><div class="bar" style="width:20px"></div></div>
  <div class="row"><div class="tok">large</div><div class="px">32 px</div><div class="bar" style="width:32px"></div></div>
  <div class="row"><div class="tok">xLarge</div><div class="px">64 px</div><div class="bar" style="width:64px"></div></div>
</body></html>
