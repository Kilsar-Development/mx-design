<!doctype html>
<!-- @dsCard group="Components" name="Card" subtitle="Canonical Kilsar card anatomy" viewport="700x320" -->
<html><head><meta charset="utf-8"><title>Card — Anatomy</title>
<link rel="stylesheet" href="../colors_and_type.css">

<style>
  body{margin:0;padding:22px;background:#F8F8F8;font-family:'Plus Jakarta Sans'}
  .row{display:grid;grid-template-columns:repeat(2,1fr);gap:18px}
  .card{background:#fff;border-radius:16px;overflow:hidden;display:flex;flex-direction:column}
  .card .body{padding:16px;display:flex;flex-direction:column;gap:8px}
  .pill{display:inline-flex;align-items:center;height:24px;padding:0 10px;border-radius:999px;background:#E6F5E6;color:#2E7E2F;font-size:12px;font-weight:600;align-self:flex-start}
  .head{font-size:16px;font-weight:500;line-height:24px;color:#18181A}
  .meta{display:flex;gap:8px;font-size:12px;color:#838383}
  .footer{background:#F3F3F3;padding:14px 16px;display:flex;align-items:center;gap:8px}
  .progress{flex:1;height:4px;border-radius:2px;background:#E2E2E2;position:relative;overflow:hidden}
  .progress::after{content:"";position:absolute;inset:0 60% 0 0;background:#18181A}
  .ico{width:14px;height:14px;border-radius:3px;background:#838383;display:inline-block}
  .stepIndicator{font-family:'Plus Jakarta Sans';font-size:10px;font-weight:700;color:#838383;letter-spacing:.04em}
  .chev{margin-left:auto;color:#838383;font-size:18px;line-height:1}
</style></head>
<body>
  <div class="row">
    <div class="card">
      <div class="body">
        <span class="pill">Active</span>
        <div class="head">Calibration sequence</div>
        <div class="meta"><span><span class="ico"></span> 12 min</span><span><span class="ico"></span> 4 steps</span></div>
      </div>
      <div class="footer"><div class="progress"></div></div>
    </div>
    <div class="card" style="flex-direction:row;align-items:center;padding:16px;gap:12px">
      <div style="flex:1;display:flex;flex-direction:column;gap:2px">
        <span class="stepIndicator">STEP 1 OF 4</span>
        <div class="head">Pre-flight checks</div>
        <div style="display:flex;gap:6px;margin-top:6px"><span class="pill" style="background:#E5F0FF;color:#074EE8">Audio</span><span class="pill" style="background:#F3F3F3;color:#4B4B4B">Video</span></div>
      </div>
      <div class="chev">›</div>
    </div>
  </div>
</body></html>
