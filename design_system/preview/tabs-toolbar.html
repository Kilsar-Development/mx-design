<!doctype html>
<!-- @dsCard group="Components" name="Tabs & Toolbar" subtitle="Segmented tabs + top bar" viewport="700x240" -->
<html><head><meta charset="utf-8"><title>Tabs & Toolbar</title>
<link rel="stylesheet" href="../colors_and_type.css">

<style>
  body{margin:0;padding:22px;background:#F8F8F8;font-family:'Plus Jakarta Sans';display:flex;flex-direction:column;gap:18px}
  .tabs{background:#fff;border-radius:12px;display:flex;padding:4px;gap:4px;border:1px solid #E2E2E2;width:fit-content}
  .tab{padding:8px 14px;border-radius:8px;font-size:13px;font-weight:600;color:#838383;cursor:pointer}
  .tab.active{background:#18181A;color:#fff}
  .toolbar{background:#fff;border-radius:999px;padding:8px;display:flex;gap:6px;width:fit-content;box-shadow:0 4px 12px rgba(0,0,0,.06)}
  .iconbtn{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:999px;background:transparent;color:#18181A;font-weight:700;font-size:14px;cursor:pointer}
  .iconbtn.active{background:#18181A;color:#fff}
  .iconbtn:hover{background:#F3F3F3}
  .label{font-family: 'Plus Jakarta Sans';font-size:10px;color:#838383}
</style></head>
<body>
  <div>
    <div class="label" style="margin-bottom:8px">Tabs · segmented</div>
    <div class="tabs"><div class="tab active">Today</div><div class="tab">Week</div><div class="tab">Month</div><div class="tab">All</div></div>
  </div>
  <div>
    <div class="label" style="margin-bottom:8px">Floating toolbar</div>
    <div class="toolbar"><div class="iconbtn active">⌂</div><div class="iconbtn">⌕</div><div class="iconbtn">+</div><div class="iconbtn">☰</div><div class="iconbtn">⚙</div></div>
  </div>
</body></html>
