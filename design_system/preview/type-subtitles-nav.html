<!doctype html>
<!-- @dsCard group="Brand" name="type-subtitles-nav" subtitle="subtitleLarge / subtitleLargeBold / subtitleSmall / navigation" viewport="700x220" -->
<html><head><meta charset="utf-8"><title>Type — Subtitles & Navigation</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:18px 22px;background:#fff;font-family:var(--kls-font-sans);color:#18181A}
  .row{display:grid;grid-template-columns:152px 1fr 84px;gap:16px;align-items:baseline;padding:9px 0;border-top:1px solid #F3F3F3}
  .row:first-of-type{border-top:0}
  .name{font-size:11px;font-weight:600;color:#838383;letter-spacing:.04em;text-transform:uppercase;font-variant-numeric:tabular-nums}
  .meta{font-size:10px;color:#B4B4B4;font-variant-numeric:tabular-nums;text-align:right;font-weight:500}
  .meta b{color:#838383;font-weight:600}
</style></head>
<body>
  <div class="row"><span class="name">subtitleLarge</span>      <span class="kls-text-subtitle-large">Section subtitle</span>      <span class="meta"><b>18</b>·600 / 400</span></div>
  <div class="row"><span class="name">subtitleLargeBold</span>  <span class="kls-text-subtitle-large-bold">Section subtitle, bold</span> <span class="meta"><b>18</b>·700</span></div>
  <div class="row"><span class="name">subtitleSmall</span>      <span class="kls-text-subtitle-small">Smaller section subtitle</span> <span class="meta"><b>16</b>·500 / 600</span></div>
  <div class="row"><span class="name">navigation</span>         <span class="kls-text-navigation">EXPLORE</span>                <span class="meta"><b>10</b>·500 / <b>14</b>·600</span></div>
</body></html>
