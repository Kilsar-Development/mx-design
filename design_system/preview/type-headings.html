<!doctype html>

<html><head><meta charset="utf-8"><title>Type — Headings (h1–h5)</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:18px 22px;background:#fff;font-family:var(--kls-font-sans);color:#18181A}
  .row{display:grid;grid-template-columns:88px 1fr 84px;gap:18px;align-items:baseline;padding:9px 0;border-top:1px solid #F3F3F3}
  .row:first-of-type{border-top:0}
  .name{font-size:11px;font-weight:600;color:#838383;letter-spacing:.04em;text-transform:uppercase;font-variant-numeric:tabular-nums}
  .meta{font-size:10px;color:#B4B4B4;font-variant-numeric:tabular-nums;text-align:right;font-weight:500}
  .meta b{color:#838383;font-weight:600}
</style></head>
<body>
  <div class="row"><span class="name">h1</span>      <span class="kls-text-h1">Heading one</span>      <span class="meta"><b>28</b>·700 / <b>32</b>·400</span></div>
  <div class="row"><span class="name">h2</span>      <span class="kls-text-h2">Heading two</span>      <span class="meta"><b>24</b>·600 / <b>28</b>·500</span></div>
  <div class="row"><span class="name">h3</span>      <span class="kls-text-h3">Heading three</span>    <span class="meta"><b>20</b>·600 / <b>25</b>·600</span></div>
  <div class="row"><span class="name">h4</span>      <span class="kls-text-h4">Heading four</span>     <span class="meta"><b>18</b>·600 / <b>22</b>·600</span></div>
  <div class="row"><span class="name">h5</span>      <span class="kls-text-h5">Heading five</span>     <span class="meta"><b>16</b>·600 / <b>20</b>·400</span></div>
</body></html>
