<!doctype html>
<!-- @dsCard group="Brand" name="Iconography" subtitle="Heroicons — outline 24 px default" viewport="700x240" -->
<html><head><meta charset="utf-8"><title>Iconography</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:22px;background:#fff;font-family:'Plus Jakarta Sans';color:#18181A}
  .grid{display:grid;grid-template-columns:repeat(8,1fr);gap:14px 18px}
  .ic{display:flex;flex-direction:column;align-items:center;gap:6px}
  .ic svg{width:24px;height:24px}
  .nm{font-family: 'Plus Jakarta Sans';font-size:9px;color:#838383}
  .head{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#838383;margin-bottom:10px}
  .note{font-family: 'Plus Jakarta Sans';font-size:10px;color:#838383;margin-top:14px}
</style></head>
<body>
  <div class="head">Heroicons outline · 24px · 1.5 stroke · #18181A</div>
  <div class="grid" id="g"></div>
  <div class="note">Linked from Heroicons CDN. Glyph names match Kilsar Figma 1:1 (~270 icons).</div>
  <script>
    const names=['home','user','bell','magnifying-glass','plus','minus','x-mark','check','chevron-right','chevron-down','arrow-up','arrow-down','cog-6-tooth','calendar','clock','document','folder','funnel','heart','star','trash','pencil','paper-airplane','sparkles'];
    const g=document.getElementById('g');
    for(const n of names){
      const wrap=document.createElement('div');wrap.className='ic';
      const img=document.createElement('img');img.src=`https://unpkg.com/heroicons@2.1.5/24/outline/${n}.svg`;img.style.width='24px';img.style.height='24px';
      wrap.appendChild(img);
      const t=document.createElement('div');t.className='nm';t.textContent=n;wrap.appendChild(t);
      g.appendChild(wrap);
    }
  </script>
</body></html>
